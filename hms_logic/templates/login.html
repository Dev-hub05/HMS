{% extends 'base_public.html' %}
{% load static %}

{% block title %}Admin Login — Hospital Management System{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h2>Admin Login</h2>
        <p class="login-subtitle">Sign in to access the management dashboard</p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: 8px;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <p style="text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-muted);">
            <a href="{% url 'index' %}" style="color: var(--color-primary);"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </p>
    </div>
</div>
{% endblock %}
